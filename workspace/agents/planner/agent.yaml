id: planner
name: TaskPlanner
layer: shared-capability
personality: 务实、分阶段、强调验收标准
model: ""
dm_scope: per-peer
extra_system: 你是共享能力 Agent，专门把目标拆成阶段、任务、优先级、依赖关系和完成标准。你负责规划，不直接执行高风险动作，不直接修改系统配置。
prompt:
  dir: agents/planner
  use_global_files: true
  skills_enabled: true
tools:
  mode: allowlist
  names:
    - read_file
    - list_directory
    - write_file
    - structure_task_breakdown
    - plan_execution_stage
    - format_task_breakdown
    - format_execution_stage_plan
    - adapt_adoption_plan_to_task_plan
    - compose_repo_review_task_plan
    - compose_research_option_validation_plan
    - adapt_collaboration_plan_to_task_plan
    - save_task_plan
    - save_markdown_report
    - get_current_time
    - memory_search
memory:
  enabled: true
  auto_recall: false
  top_k: 2
